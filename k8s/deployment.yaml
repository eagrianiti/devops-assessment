apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-app
  namespace: sample-app
  labels:
    app: sample-app
spec:
  replicas: 2
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1          # allow 1 extra pod above `replicas` during rollout
      maxUnavailable: 0    # never drop below desired replica count -> zero-downtime rollout
  selector:
    matchLabels:
      app: sample-app
  template:
    metadata:
      labels:
        app: sample-app
    spec:
      containers:
        - name: sample-app
          image: eagrianitii/sample-app:local   # default for local `kubectl apply -f k8s/`; pipeline substitutes this on its own copy of the manifests
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"

          # --- Startup probe ---
          # Covers slow boot (JIT warm-up, cache priming). While this fails, liveness/readiness
          # are NOT evaluated, so the container isn't killed mid-startup. Once it succeeds once,
          # it's never checked again.
          startupProbe:
            httpGet:
              path: /health/startup
              port: 8080
            failureThreshold: 30   # 30 * 2s = up to 60s to start before Kubernetes gives up
            periodSeconds: 2

          # --- Liveness probe ---
          # Cheap, process-only check. If this fails repeatedly, Kubernetes kills and restarts
          # the pod — use only for "is the process stuck/deadlocked", not for dependency health,
          # or you'll get restart-loops caused by a downstream outage instead of fixing it.
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8080
            initialDelaySeconds: 0   # startupProbe already covers the warm-up window
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 2

          # --- Readiness probe ---
          # Checks downstream dependencies (DB, cache, etc). If it fails, the pod is pulled out
          # of the Service's endpoint list (no traffic sent) but NOT restarted — it can recover
          # on its own once the dependency is back, which is exactly what you want during a
          # rolling update or a transient dependency blip.
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            initialDelaySeconds: 0
            periodSeconds: 5
            failureThreshold: 3
            timeoutSeconds: 2
