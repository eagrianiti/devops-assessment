apiVersion: v1
kind: Service
metadata:
  name: sample-app
  namespace: sample-app
  labels:
    app: sample-app
spec:
  type: ClusterIP   # use LoadBalancer/NodePort instead if exposing directly outside the cluster
  selector:
    app: sample-app
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
