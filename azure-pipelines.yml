# azure-pipelines.yml
# CI/CD pipeline: build .NET app -> build & push Docker image -> deploy to Kubernetes
#
# Required pipeline variables / library group "sample-app-vars":
#   containerRegistry        - Service connection name to your ACR (Azure Container Registry)
#   imageRepository           - e.g. "sample-app"
#   dockerfilePath            - "$(Build.SourcesDirectory)/Dockerfile"
#   kubernetesServiceConnection - Service connection name to your k8s cluster (AKS or Minikube via generic k8s SC)
#   k8sNamespace              - e.g. "sample-app"

trigger:
  branches:
    include:
      - main
  paths:
    include:
      - src/SampleApp/*
      - Dockerfile
      - k8s/*
      - azure-pipelines.yml

pr:
  branches:
    include:
      - main

pool: 'local-minikube-pool'  # self-hosted agent on the developer machine that also runs Minikube

variables:
  - group: sample-app-vars
  - name: tag
    value: '$(Build.BuildId)'
  - name: buildConfiguration
    value: 'Release'

stages:

  # ---------------------------------------------------------------------
  # Stage 1: Build & test the .NET application (Task 1)
  # ---------------------------------------------------------------------
  - stage: Build
    displayName: 'Build and Test .NET App'
    jobs:
      - job: BuildJob
        displayName: 'dotnet build & test'
        steps:
          - task: UseDotNet@2
            displayName: 'Install .NET 8 SDK'
            inputs:
              packageType: 'sdk'
              version: '8.0.x'

          - task: DotNetCoreCLI@2
            displayName: 'dotnet restore'
            inputs:
              command: 'restore'
              projects: '**/*.csproj'   # SampleApp + SampleApp.Tests

          - task: DotNetCoreCLI@2
            displayName: 'dotnet build'
            inputs:
              command: 'build'
              projects: 'src/SampleApp/SampleApp.csproj'
              arguments: '--configuration $(buildConfiguration) --no-restore'

          - task: DotNetCoreCLI@2
            displayName: 'dotnet test'
            condition: succeeded()
            inputs:
              command: 'test'
              projects: 'tests/SampleApp.Tests/SampleApp.Tests.csproj'
              # Not --no-build: the app build above only builds SampleApp.csproj, not the
              # test project, so this step restores/builds the test project itself.
              arguments: '--configuration $(buildConfiguration) --logger trx --collect "Code coverage"'

          - task: PublishTestResults@2
            condition: succeededOrFailed()
            inputs:
              testResultsFormat: 'VSTest'
              testResultsFiles: '**/*.trx'

          - task: DotNetCoreCLI@2
            displayName: 'dotnet publish (artifact for containerization)'
            inputs:
              command: 'publish'
              publishWebProjects: false
              projects: 'src/SampleApp/SampleApp.csproj'
              arguments: '--configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory)/publish'
              zipAfterPublish: false

          - publish: '$(Build.ArtifactStagingDirectory)/publish'
            artifact: 'drop'
            displayName: 'Publish build artifact'

  # ---------------------------------------------------------------------
  # Stage 2: Build & push Docker image (Task 2)
  # ---------------------------------------------------------------------
  - stage: DockerBuildPush
    displayName: 'Build and Push Docker Image'
    dependsOn: Build
    condition: succeeded()
    jobs:
      - job: DockerJob
        displayName: 'docker build & push'
        steps:
          - task: Docker@2
            displayName: 'Build and push image to ACR'
            inputs:
              containerRegistry: '$(containerRegistry)'
              repository: '$(imageRepository)'
              command: 'buildAndPush'
              Dockerfile: '$(dockerfilePath)'
              buildContext: '$(Build.SourcesDirectory)'
              tags: |
                $(tag)
                latest

  # ---------------------------------------------------------------------
  # Stage 3: Deploy to Kubernetes (Task 3)
  # ---------------------------------------------------------------------
  - stage: DeployToKubernetes
    displayName: 'Deploy to Kubernetes'
    dependsOn: DockerBuildPush
    condition: succeeded()
    jobs:
      - deployment: DeployJob
        displayName: 'kubectl apply & rollout'
        environment: 'sample-app-k8s'  # Azure DevOps Environment; add approval gates here for staging-first safety
        strategy:
          runOnce:
            deploy:
              steps:
                # IMPORTANT: substitute the tag on a COPY in the staging directory, never on the
                # tracked k8s/deployment.yaml in the agent's working copy. Self-hosted agents do
                # NOT clean the workspace between runs by default, so an in-place edit here would
                # permanently replace the "local" default with a literal build number the first
                # time this runs -- every run after that would silently redeploy that same stale
                # tag, since there would be nothing left in the tracked file to substitute.
                - script: |
                    mkdir -p $(Build.ArtifactStagingDirectory)/k8s
                    cp k8s/*.yaml $(Build.ArtifactStagingDirectory)/k8s/
                  displayName: 'Copy manifests to staging dir'

                - powershell: |
                    $manifest = "$(Build.ArtifactStagingDirectory)/k8s/deployment.yaml"
                    (Get-Content $manifest) -replace 'eagrianitii/sample-app:local', 'eagrianitii/sample-app:$(tag)' | Set-Content $manifest
                    Write-Host "Substituted image tag $(tag) into staged copy: $manifest"
                  displayName: 'Substitute image tag in staged copy'

                - script: |
                    kubectl apply -f $(Build.ArtifactStagingDirectory)/k8s/deployment.yaml -n $(k8sNamespace)
                    kubectl apply -f $(Build.ArtifactStagingDirectory)/k8s/service.yaml -n $(k8sNamespace)
                    kubectl apply -f $(Build.ArtifactStagingDirectory)/k8s/hpa.yaml -n $(k8sNamespace)
                  displayName: 'kubectl apply manifests (local kubeconfig on self-hosted agent)'

                - script: |
                    kubectl rollout status deployment/sample-app -n $(k8sNamespace) --timeout=120s
                  displayName: 'Verify rollout status'
